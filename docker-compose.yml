# -----------------------------------------------------------------------------
# 文件说明：
# 这是本项目的本地基础设施编排文件，用于快速启动 MySQL 和 Redis。
# 这份文件仅用于本地开发，不用于云服务器生产/演示环境。
# 为了降低误用风险，MySQL 和 Redis 端口只绑定到 127.0.0.1，不直接暴露公网。
# -----------------------------------------------------------------------------

version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: campusmast-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: campusmast
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: campusmast
      MYSQL_PASSWORD: campusmast
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: campusmast-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data

volumes:
  mysql-data:
  redis-data:
