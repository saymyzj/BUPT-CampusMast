# -----------------------------------------------------------------------------
# 文件说明：
# 这是单机 Linux 生产/演示环境的统一反向代理配置。
# 它负责：
# 1. 把根路径转发到前端静态站点容器
# 2. 把 `/api` 转发到 FastAPI 容器
# 3. 把 `/ws` 转发到 FastAPI WebSocket 网关
# -----------------------------------------------------------------------------

upstream campusmast_frontend {
  server frontend:80;
}

upstream campusmast_backend {
  server backend:9000;
}

server {
  listen 80;
  server_name _;

  client_max_body_size 20m;

  location / {
    proxy_pass http://campusmast_frontend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/ {
    proxy_pass http://campusmast_backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /ws/ {
    proxy_pass http://campusmast_backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

