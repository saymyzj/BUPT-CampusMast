# -----------------------------------------------------------------------------
# 文件说明：
# 这是单台 Linux 云服务器可直接使用的生产/演示环境编排文件。
# 它统一启动：
# - Nginx 反向代理
# - 前端静态站点
# - FastAPI 后端
# - MySQL（带持久化卷）
# - Redis（带持久化卷）
#
# 该文件体现了当前冻结文档中的“单云主机/容器主部署”基线。
# -----------------------------------------------------------------------------

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: campusmast-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: campusmast-frontend
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: campusmast-backend
    restart: unless-stopped
    command: >
      sh -c "alembic upgrade head &&
             python -m app.seed_data &&
             uvicorn app.main:app --host 0.0.0.0 --port 9000"
    env_file:
      - backend/.env.production
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8.0
    container_name: campusmast-mysql-prod
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: campusmast
      MYSQL_ROOT_PASSWORD: replace-with-strong-root-password
      MYSQL_USER: campusmast
      MYSQL_PASSWORD: replace-with-strong-app-password
    volumes:
      - mysql-prod-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: campusmast-redis-prod
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-prod-data:/data

volumes:
  mysql-prod-data:
  redis-prod-data:
