# -----------------------------------------------------------------------------
# 文件说明：
# 这是 Alembic 的基础配置文件。
# 当前脚手架阶段先保证迁移工具路径与日志配置就绪，后续组长与 B 同学可以直接
# 在此基础上生成和管理数据库迁移脚本。
# -----------------------------------------------------------------------------

[alembic]
script_location = alembic
prepend_sys_path = .

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
