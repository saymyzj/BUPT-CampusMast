# -----------------------------------------------------------------------------
# 文件说明：
# 这是前端静态站点容器内部的 Nginx 配置。
# 主要作用是为 Vue 单页应用提供 SPA fallback，确保刷新子路由时不会返回 404。
# -----------------------------------------------------------------------------

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }
}

