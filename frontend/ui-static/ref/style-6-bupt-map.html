<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CampusMast - 北邮地图高保真原型</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  /*
    文件说明：
    这是 CampusMast 的“地图即主页”高保真静态原型。
    页面不再把 JPG 当成背景叠热点，而是用单个 SVG 重建北邮西土城校区的矢量底图，
    并通过数据驱动的方式渲染：
    1. 楼宇块面与标签
    2. 任务点位、聚合数和悬停摘要
    3. 点击固定详情面板
    4. 核心楼宇楼层与楼内示意
    该文件用于视觉与交互定稿，后续可较平滑迁移到 Vue。
  */

  :root {
    --ink-950: #11141b;
    --ink-900: #1c2330;
    --ink-700: #405068;
    --ink-500: #728097;
    --ink-300: #c4ccda;
    --paper: #f4f1eb;
    --paper-strong: #ece6db;
    --canvas: #dbe8ea;
    --road: #b9c3c8;
    --road-strong: #98a7ae;
    --border: rgba(31, 42, 58, 0.18);
    --label-bg: rgba(255, 252, 246, 0.92);
    --panel-bg: rgba(255, 251, 245, 0.94);
    --shadow-soft: 0 16px 42px rgba(26, 36, 49, 0.12);
    --shadow-card: 0 22px 48px rgba(20, 29, 40, 0.18);
    --blue: #4970c8;
    --rose: #d87379;
    --amber: #d6a74f;
    --olive: #89a35a;
    --orange: #dc8b59;
    --gray-zone: #d2d0cc;
    --success: #6ca365;
    --danger: #ca6155;
    --carry: #d6a74f;
    --food: #d87379;
    --delivery: #4970c8;
    --other: #6c8c78;
    --radius-xs: 10px;
    --radius-sm: 16px;
    --radius-md: 22px;
    --radius-lg: 28px;
    --toolbar-h: 72px;
    --floor-panel-w: 356px;
    --map-w: 1200;
    --map-h: 860;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html,
  body {
    height: 100%;
  }

  body {
    font-family: "Manrope", "Noto Sans SC", sans-serif;
    color: var(--ink-900);
    background:
      radial-gradient(circle at top left, rgba(73, 112, 200, 0.08), transparent 24%),
      radial-gradient(circle at bottom right, rgba(214, 167, 79, 0.08), transparent 30%),
      linear-gradient(180deg, #f7f4ef 0%, #efe9df 100%);
    overflow: hidden;
  }

  button,
  input,
  select {
    font: inherit;
  }

  .app {
    position: relative;
    height: 100%;
    padding: 18px;
  }

  .hud {
    position: absolute;
    inset: 18px 18px auto;
    z-index: 30;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 18px;
    min-height: var(--toolbar-h);
  }

  .hud-card {
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    background: rgba(255, 251, 245, 0.84);
    border: 1px solid rgba(31, 42, 58, 0.1);
    box-shadow: var(--shadow-soft);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    border-radius: 999px;
  }

  .brand-mark {
    width: 42px;
    height: 42px;
    display: grid;
    place-items: center;
    border-radius: 14px;
    background: var(--ink-950);
    color: #fff;
    font-weight: 800;
    letter-spacing: -0.03em;
  }

  .brand-meta strong {
    display: block;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.04em;
  }

  .brand-meta span {
    display: block;
    margin-top: 2px;
    font-size: 12px;
    color: var(--ink-500);
  }

  .toolbar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 10px;
    border-radius: 999px;
  }

  .toolbar-chip {
    border: none;
    background: transparent;
    color: var(--ink-500);
    padding: 10px 16px;
    border-radius: 999px;
    cursor: pointer;
    transition: 180ms ease;
    font-size: 13px;
    font-weight: 700;
  }

  .toolbar-chip:hover {
    background: rgba(17, 20, 27, 0.06);
    color: var(--ink-900);
  }

  .toolbar-chip.active {
    background: var(--ink-950);
    color: #fff;
  }

  .status-group {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    border-radius: 999px;
  }

  .status-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 0 6px rgba(108, 163, 101, 0.12);
  }

  .status-label {
    font-size: 12px;
    color: var(--ink-500);
  }

  .status-value {
    font-size: 13px;
    font-weight: 800;
    color: var(--ink-900);
  }

  .map-shell {
    position: absolute;
    inset: 108px 18px 18px;
    border-radius: 34px;
    overflow: hidden;
    background: linear-gradient(180deg, #e5eff0 0%, #d6e4e7 100%);
    box-shadow: var(--shadow-card);
    border: 1px solid rgba(31, 42, 58, 0.08);
  }

  .map-stage {
    position: absolute;
    inset: 0;
  }

  .map-svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  .overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .task-layer,
  .detail-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .beacon {
    position: absolute;
    transform: translate(-50%, -50%);
    pointer-events: auto;
  }

  .beacon-btn {
    position: relative;
    border: none;
    background: transparent;
    cursor: pointer;
    display: grid;
    place-items: center;
    width: 46px;
    height: 46px;
  }

  .beacon-ring {
    position: absolute;
    inset: 5px;
    border-radius: 999px;
    border: 1px solid rgba(255, 255, 255, 0.7);
    opacity: 0;
    transform: scale(0.9);
    transition: 180ms ease;
  }

  .beacon:hover .beacon-ring,
  .beacon.active .beacon-ring {
    opacity: 1;
    transform: scale(1.08);
  }

  .beacon-core {
    position: relative;
    z-index: 2;
    width: 18px;
    height: 18px;
    border-radius: 999px;
    border: 3px solid #fff;
    box-shadow: 0 10px 18px rgba(17, 20, 27, 0.22);
    transition: transform 180ms ease;
  }

  .beacon:hover .beacon-core,
  .beacon.active .beacon-core {
    transform: scale(1.14);
  }

  .beacon-pulse {
    position: absolute;
    inset: 8px;
    border-radius: 999px;
    opacity: 0.32;
    animation: pulse-ring 2.4s ease-out infinite;
  }

  @keyframes pulse-ring {
    0% { transform: scale(0.86); opacity: 0.28; }
    70% { transform: scale(1.7); opacity: 0; }
    100% { transform: scale(1.7); opacity: 0; }
  }

  .beacon-summary {
    position: absolute;
    left: 50%;
    top: -12px;
    transform: translate(-50%, -100%);
    padding: 7px 12px;
    border-radius: 999px;
    background: var(--label-bg);
    border: 1px solid rgba(31, 42, 58, 0.12);
    box-shadow: 0 10px 20px rgba(17, 20, 27, 0.12);
    font-size: 12px;
    font-weight: 800;
    color: var(--ink-900);
    display: flex;
    align-items: center;
    gap: 7px;
    white-space: nowrap;
    opacity: 0.94;
    transition: 180ms ease;
  }

  .beacon:hover .beacon-summary,
  .beacon.active .beacon-summary {
    transform: translate(-50%, calc(-100% - 2px));
    opacity: 1;
  }

  .beacon-summary em {
    font-style: normal;
    color: var(--ink-500);
    font-weight: 700;
  }

  .category-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .cluster {
    position: absolute;
    transform: translate(-50%, -50%);
    width: 42px;
    height: 42px;
    border-radius: 16px;
    background: rgba(255, 251, 245, 0.92);
    border: 1px solid rgba(31, 42, 58, 0.14);
    box-shadow: 0 12px 22px rgba(17, 20, 27, 0.14);
    display: grid;
    place-items: center;
    pointer-events: none;
    font-size: 12px;
    font-weight: 900;
    color: var(--ink-900);
  }

  .detail-card {
    position: absolute;
    width: 298px;
    padding: 18px;
    border-radius: var(--radius-md);
    background: var(--panel-bg);
    border: 1px solid rgba(31, 42, 58, 0.12);
    box-shadow: 0 20px 40px rgba(17, 20, 27, 0.18);
    pointer-events: auto;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    transform-origin: bottom center;
    animation: detail-in 180ms ease;
  }

  @keyframes detail-in {
    from {
      opacity: 0;
      transform: translateY(8px) scale(0.98);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  .detail-kicker {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 8px;
  }

  .detail-kicker span {
    font-size: 11px;
    color: var(--ink-500);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 800;
  }

  .detail-reward {
    font-size: 26px;
    font-weight: 900;
    letter-spacing: -0.04em;
  }

  .detail-title {
    font-size: 18px;
    font-weight: 900;
    line-height: 1.32;
    margin-bottom: 10px;
  }

  .detail-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 12px;
  }

  .meta-pill {
    padding: 6px 10px;
    border-radius: 999px;
    background: rgba(17, 20, 27, 0.05);
    color: var(--ink-700);
    font-size: 11px;
    font-weight: 800;
  }

  .meta-pill.urgent {
    background: rgba(202, 97, 85, 0.12);
    color: var(--danger);
  }

  .detail-desc {
    font-size: 13px;
    line-height: 1.58;
    color: var(--ink-700);
    margin-bottom: 14px;
  }

  .detail-actions {
    display: flex;
    gap: 10px;
  }

  .detail-btn {
    flex: 1;
    border: none;
    border-radius: 14px;
    padding: 12px 14px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 900;
    transition: 160ms ease;
  }

  .detail-btn.primary {
    background: var(--ink-950);
    color: #fff;
  }

  .detail-btn.secondary {
    background: rgba(17, 20, 27, 0.06);
    color: var(--ink-900);
  }

  .detail-btn:hover {
    transform: translateY(-1px);
  }

  .map-legend {
    position: absolute;
    left: 22px;
    bottom: 22px;
    z-index: 24;
    padding: 14px 16px;
    border-radius: 20px;
    background: rgba(255, 251, 245, 0.86);
    border: 1px solid rgba(31, 42, 58, 0.1);
    box-shadow: var(--shadow-soft);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    display: grid;
    gap: 8px;
  }

  .legend-title {
    font-size: 11px;
    color: var(--ink-500);
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .legend-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 700;
    color: var(--ink-900);
  }

  .building-chip {
    position: absolute;
    min-width: 96px;
    transform: translate(-50%, -50%);
    padding: 8px 12px;
    border-radius: 16px;
    background: rgba(255, 251, 245, 0.72);
    border: 1px solid rgba(31, 42, 58, 0.1);
    box-shadow: 0 10px 18px rgba(17, 20, 27, 0.08);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    pointer-events: auto;
    cursor: pointer;
    transition: 180ms ease;
  }

  .building-chip:hover,
  .building-chip.active {
    background: rgba(255, 251, 245, 0.94);
    transform: translate(-50%, calc(-50% - 2px));
    box-shadow: 0 14px 24px rgba(17, 20, 27, 0.14);
  }

  .building-chip strong {
    display: block;
    font-size: 13px;
    font-weight: 900;
    color: var(--ink-900);
  }

  .building-chip span {
    display: block;
    margin-top: 2px;
    font-size: 11px;
    color: var(--ink-500);
    font-weight: 700;
  }

  .map-note {
    position: absolute;
    right: 22px;
    bottom: 22px;
    z-index: 24;
    padding: 14px 16px;
    border-radius: 20px;
    background: rgba(17, 20, 27, 0.78);
    color: rgba(255, 255, 255, 0.92);
    width: 236px;
    box-shadow: 0 18px 30px rgba(17, 20, 27, 0.24);
  }

  .map-note strong {
    display: block;
    font-size: 12px;
    font-weight: 900;
    margin-bottom: 6px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .map-note p {
    font-size: 12px;
    line-height: 1.6;
    color: rgba(255, 255, 255, 0.74);
  }

  .floor-panel {
    position: absolute;
    top: 18px;
    right: 18px;
    bottom: 18px;
    width: var(--floor-panel-w);
    z-index: 40;
    border-radius: 30px;
    background: rgba(255, 251, 245, 0.94);
    border: 1px solid rgba(31, 42, 58, 0.12);
    box-shadow: 0 26px 50px rgba(17, 20, 27, 0.2);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transform: translateX(calc(100% + 24px));
    transition: transform 220ms ease;
  }

  .floor-panel.open {
    transform: translateX(0);
  }

  .panel-header {
    padding: 22px 22px 16px;
    border-bottom: 1px solid rgba(31, 42, 58, 0.08);
  }

  .panel-kicker {
    font-size: 11px;
    color: var(--ink-500);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 900;
  }

  .panel-title-row {
    margin-top: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
  }

  .panel-title {
    font-size: 24px;
    font-weight: 900;
    line-height: 1.12;
    letter-spacing: -0.05em;
  }

  .panel-close {
    width: 38px;
    height: 38px;
    border-radius: 12px;
    border: none;
    background: rgba(17, 20, 27, 0.06);
    color: var(--ink-900);
    font-size: 18px;
    cursor: pointer;
  }

  .panel-summary {
    margin-top: 10px;
    font-size: 13px;
    color: var(--ink-700);
    line-height: 1.6;
  }

  .floor-tabs {
    display: flex;
    gap: 8px;
    padding: 18px 22px 0;
    flex-wrap: wrap;
  }

  .floor-tab {
    padding: 8px 12px;
    border-radius: 999px;
    border: none;
    background: rgba(17, 20, 27, 0.06);
    color: var(--ink-700);
    cursor: pointer;
    font-size: 12px;
    font-weight: 800;
    transition: 160ms ease;
  }

  .floor-tab.active {
    background: var(--ink-950);
    color: #fff;
  }

  .panel-body {
    padding: 18px 22px 22px;
    overflow-y: auto;
    display: grid;
    gap: 16px;
  }

  .panel-body::-webkit-scrollbar {
    width: 8px;
  }

  .panel-body::-webkit-scrollbar-thumb {
    background: rgba(31, 42, 58, 0.14);
    border-radius: 999px;
  }

  .floor-meta {
    display: grid;
    gap: 10px;
  }

  .floor-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .floor-badge {
    padding: 6px 10px;
    border-radius: 999px;
    background: rgba(17, 20, 27, 0.05);
    color: var(--ink-700);
    font-size: 11px;
    font-weight: 800;
  }

  .floor-desc {
    font-size: 13px;
    color: var(--ink-700);
    line-height: 1.6;
  }

  .floor-map-card {
    padding: 14px;
    border-radius: 22px;
    background: rgba(219, 232, 234, 0.48);
    border: 1px solid rgba(31, 42, 58, 0.08);
  }

  .floor-map-card svg {
    width: 100%;
    height: auto;
    display: block;
  }

  .poi-list {
    display: grid;
    gap: 10px;
  }

  .poi-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 14px;
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.66);
    border: 1px solid rgba(31, 42, 58, 0.06);
  }

  .poi-marker {
    width: 10px;
    height: 10px;
    margin-top: 5px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .poi-item strong {
    display: block;
    font-size: 13px;
    font-weight: 900;
    color: var(--ink-900);
  }

  .poi-item span {
    display: block;
    margin-top: 4px;
    font-size: 12px;
    color: var(--ink-700);
    line-height: 1.5;
  }

  .mobile-tip {
    display: none;
  }

  .type-delivery { color: var(--delivery); }
  .type-food { color: var(--food); }
  .type-carry { color: var(--carry); }
  .type-other { color: var(--other); }

  .bg-delivery { background: var(--delivery); }
  .bg-food { background: var(--food); }
  .bg-carry { background: var(--carry); }
  .bg-other { background: var(--other); }

  @media (max-width: 1100px) {
    .hud {
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .status-group {
      justify-content: flex-start;
      flex-wrap: wrap;
    }

    .map-shell {
      inset: 164px 12px 12px;
    }

    .floor-panel {
      top: auto;
      left: 12px;
      right: 12px;
      bottom: 12px;
      width: auto;
      max-height: 62vh;
      border-radius: 28px 28px 20px 20px;
      transform: translateY(calc(100% + 24px));
    }

    .floor-panel.open {
      transform: translateY(0);
    }

    .mobile-tip {
      display: block;
      position: absolute;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      z-index: 25;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(17, 20, 27, 0.72);
      color: rgba(255, 255, 255, 0.84);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
  }
</style>
</head>
<body>
  <div class="app">
    <div class="hud">
      <div class="brand hud-card">
        <div class="brand-mark">CM</div>
        <div class="brand-meta">
          <strong>CampusMast 地图中枢</strong>
          <span>北邮西土城校区 · 任务概览全部压在地图上</span>
        </div>
      </div>

      <div class="toolbar hud-card" id="toolbar"></div>

      <div class="status-group">
        <div class="status-pill hud-card">
          <span class="status-dot"></span>
          <div>
            <div class="status-label">实时在线任务</div>
            <div class="status-value" id="liveCount">18 个地图点</div>
          </div>
        </div>
        <div class="status-pill hud-card">
          <div>
            <div class="status-label">钱包</div>
            <div class="status-value">¥ 328.00</div>
          </div>
        </div>
      </div>
    </div>

    <div class="map-shell">
      <div class="map-stage">
        <svg class="map-svg" viewBox="0 0 1200 860" preserveAspectRatio="xMidYMid meet" aria-label="北邮西土城校区地图">
          <defs>
            <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
              <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#162130" flood-opacity="0.12"></feDropShadow>
            </filter>
          </defs>
          <g id="mapRoot"></g>
        </svg>

        <div class="overlay">
          <div class="task-layer" id="taskLayer"></div>
          <div class="detail-layer" id="detailLayer"></div>
          <div id="buildingLayer"></div>
        </div>
      </div>

      <div class="map-legend">
        <div class="legend-title">任务图例</div>
        <div class="legend-row"><span class="category-dot bg-delivery"></span>代取/代送</div>
        <div class="legend-row"><span class="category-dot bg-food"></span>代买餐食</div>
        <div class="legend-row"><span class="category-dot bg-carry"></span>搬运协助</div>
        <div class="legend-row"><span class="category-dot bg-other"></span>占座/打印/其他</div>
      </div>

      <div class="map-note">
        <strong>当前交互基线</strong>
        <p>悬停只看摘要，点击才固定详情；点击楼宇或详情中的“查看楼层”会打开右侧楼层浮层，保持地图上下文不丢失。</p>
      </div>

  let activeFilter = "all";

  let activeBuildingId = null;
  let activeFloorId = null;

  function svgEl(tag, attrs = {}, text = "") {
    const node = document.createElementNS("http://www.w3.org/2000/svg", tag);
    Object.entries(attrs).forEach(([key, value]) => node.setAttribute(key, value));
    if (text) node.textContent = text;
    return node;
  }

  function ratioX(x) {
    return (x / MAP.width) * 100;
  }

  function ratioY(y) {
    return (y / MAP.height) * 100;
  }

  function buildingById(id) {
    return buildings.find((item) => item.id === id);
  }

  function pinMatchesFilter(pin) {
    if (activeFilter === "all") return true;
    if (activeFilter === "fast") return pin.filter === "fast";
    if (activeFilter === "high") return pin.filter === "high";
    return true;
  }

  function getPinColor(category) {
    return {
      delivery: "var(--delivery)",
      food: "var(--food)",
      carry: "var(--carry)",
      other: "var(--other)"
    }[category] || "var(--ink-700)";
  }

  function getZoneStyle(type) {
    return zoneStyles[type] || zoneStyles.corridor;
  }

  function renderToolbar() {
    toolbarEl.innerHTML = "";
    filters.forEach((filter) => {
      const btn = document.createElement("button");
      btn.className = "toolbar-chip" + (filter.id === activeFilter ? " active" : "");
      btn.textContent = filter.label;
      btn.addEventListener("click", () => {
        activeFilter = filter.id;
        if (activeTaskId && !pinMatchesFilter(taskPins.find((pin) => pin.id === activeTaskId))) {
          activeTaskId = null;
        }
        renderToolbar();
        renderTaskLayer();
        renderDetailCard();
      });
      toolbarEl.appendChild(btn);
    });
  }

  function drawMap() {
    mapRoot.innerHTML = "";

    mapRoot.appendChild(svgEl("rect", {
      x: 86,
      y: 54,
      width: 1028,
      height: 760,
      rx: 16,
      fill: "#d8e6e8",
      stroke: "#9db0b7",
      "stroke-width": 2
    }));

    roads.horizontal.forEach((road) => {
      mapRoot.appendChild(svgEl("rect", {
        x: road.x,
        y: road.y,
        width: road.w,
        height: road.h,
        rx: 6,
        fill: road.muted ? "#c3cacc" : "var(--road)"
      }));
      if (road.label) {
        const text = svgEl("text", {
          x: road.labelX,
          y: road.labelY,
          fill: road.muted ? "#8c989b" : "#11141b",
          "font-size": road.size || 18,
          "font-weight": road.muted ? 700 : 900,
          "text-anchor": "middle",
          "font-family": "Noto Sans SC, sans-serif"
        }, road.label);
        mapRoot.appendChild(text);
      }
    });

    roads.vertical.forEach((road) => {
      mapRoot.appendChild(svgEl("rect", {
        x: road.x,
        y: road.y,
        width: road.w,
        height: road.h,
        rx: 6,
        fill: "var(--road)"
      }));
      if (road.label) {
        const text = svgEl("text", {
          x: road.labelX,
          y: road.labelY,
          fill: "#11141b",
          "font-size": road.size || 18,
          "font-weight": 900,
          "text-anchor": "middle",
          "font-family": "Noto Sans SC, sans-serif",
          transform: `rotate(${road.rotate}, ${road.labelX}, ${road.labelY})`
        }, road.label);
        mapRoot.appendChild(text);
      }
    });

    roads.gates.forEach((gate) => {
      mapRoot.appendChild(svgEl("rect", {
        x: gate.x,
        y: gate.y,
        width: gate.w,
        height: gate.h,
        rx: 8,
        fill: "#11141b"
      }));
      const tx = gate.vertical ? gate.x + 30 : gate.x + gate.w / 2;
      const ty = gate.vertical ? gate.y + gate.h / 2 : gate.y - 10;
      mapRoot.appendChild(svgEl("text", {
        x: tx,
        y: ty,
        fill: "#11141b",
        "font-size": 12,
        "font-weight": 900,
        "text-anchor": "middle",
        "font-family": "Noto Sans SC, sans-serif",
        transform: gate.vertical ? `rotate(-90, ${tx}, ${ty})` : undefined
      }, gate.label));
    });

    mapRoot.appendChild(svgEl("text", {
      x: 1128,
      y: 80,
      fill: "#11141b",
      "font-size": 18,
      "font-weight": 900,
      "text-anchor": "middle",
      "font-family": "Noto Sans SC, sans-serif"
    }, "北"));
    mapRoot.appendChild(svgEl("path", {
      d: "M1128 92 L1116 126 L1128 118 L1140 126 Z",
      fill: "#11141b"
    }));

    buildings.forEach((building) => {
      const style = typeStyles[building.type] || typeStyles.service;
      mapRoot.appendChild(svgEl("rect", {
        x: building.x,
        y: building.y,
        width: building.w,
        height: building.h,
        rx: building.core ? 12 : 8,
        fill: style.fill,
        stroke: style.stroke,
        "stroke-width": building.core ? 2.4 : 1.6,
        filter: building.core ? "url(#softShadow)" : undefined
      }));

      const label = svgEl("text", {
        x: building.labelPosition.x,
        y: building.labelPosition.y,
        fill: building.core ? "#11141b" : "#233245",
        "font-size": building.core ? 18 : 12,
        "font-weight": building.core ? 900 : 800,
        "text-anchor": "middle",
        "font-family": "Noto Sans SC, sans-serif"
      }, building.name);
      mapRoot.appendChild(label);
    });

    [
      { x: 202, y: 448, w: 208, h: 158, fill: "#a8d66d" },
      { x: 820, y: 430, w: 150, h: 118, fill: "#a8d66d" },
      { x: 1044, y: 430, w: 78, h: 118, fill: "#f1c04f" },
      { x: 162, y: 214, w: 58, h: 170, fill: "#6fc6df" }
    ].forEach((zone) => {
      mapRoot.appendChild(svgEl("rect", {
        x: zone.x,
        y: zone.y,
        width: zone.w,
        height: zone.h,
        rx: 8,
        fill: zone.fill,
        stroke: "rgba(31,42,58,0.14)",
        "stroke-width": 1.5
      }));
    });
  }

  function renderBuildingLayer() {
    buildingLayer.innerHTML = "";
    buildings.filter((building) => building.core).forEach((building) => {
      const chip = document.createElement("button");
      chip.className = "building-chip" + (activeBuildingId === building.id ? " active" : "");
      chip.style.left = `${ratioX(building.chipPosition.x)}%`;
      chip.style.top = `${ratioY(building.chipPosition.y)}%`;
      chip.innerHTML = `<strong>${building.abbr}</strong><span>点击查看楼层</span>`;
      chip.addEventListener("click", () => openBuilding(building.id));
      buildingLayer.appendChild(chip);
    });
  }

  function renderTaskLayer() {
    taskLayer.innerHTML = "";
    const visiblePins = taskPins.filter(pinMatchesFilter);
    liveCount.textContent = `${visiblePins.length} 个地图点`;

    visiblePins.forEach((pin) => {
      const beacon = document.createElement("div");
      beacon.className = "beacon" + (activeTaskId === pin.id ? " active" : "");
      beacon.style.left = `${ratioX(pin.anchorPosition.x)}%`;
      beacon.style.top = `${ratioY(pin.anchorPosition.y)}%`;

      const color = getPinColor(pin.category);
      beacon.innerHTML = `
        <button class="beacon-btn" aria-label="${pin.title}">
          <span class="beacon-pulse" style="background:${color};"></span>
          <span class="beacon-ring"></span>
          <span class="beacon-core" style="background:${color};"></span>
        </button>
        <div class="beacon-summary">
          <span class="category-dot" style="background:${color};"></span>
          ${pin.reward}
          <em>${pin.label}</em>
        </div>
      `;

      beacon.querySelector(".beacon-btn").addEventListener("click", (event) => {
        event.stopPropagation();
        activeTaskId = activeTaskId === pin.id ? null : pin.id;
        renderTaskLayer();
        renderDetailCard();
      });

      taskLayer.appendChild(beacon);
    });

    clusters.forEach((cluster) => {
      const visible = taskPins.some((pin) => pinMatchesFilter(pin) && buildingById(pin.buildingId)?.id === cluster.id.replace("cluster-", ""));
      if (visible) return;
      const chip = document.createElement("div");
      chip.className = "cluster";
      chip.style.left = `${ratioX(cluster.x)}%`;
      chip.style.top = `${ratioY(cluster.y)}%`;
      chip.textContent = cluster.count;
      taskLayer.appendChild(chip);
    });
  }

  function renderDetailCard() {
    detailLayer.innerHTML = "";
    if (!activeTaskId) return;
    const pin = taskPins.find((item) => item.id === activeTaskId);
    if (!pin) return;

    const card = document.createElement("div");
    card.className = "detail-card";
    const building = buildingById(pin.buildingId);
    const xPercent = ratioX(pin.anchorPosition.x);
    const yPercent = ratioY(pin.anchorPosition.y);
    const alignRight = xPercent > 70;
    const alignTop = yPercent > 60;
    card.style.left = alignRight ? `calc(${xPercent}% - 312px)` : `calc(${xPercent}% + 18px)`;
    card.style.top = alignTop ? `calc(${yPercent}% - 218px)` : `calc(${yPercent}% - 8px)`;
    card.innerHTML = `
      <div class="detail-kicker">
        <span class="type-${pin.category}">${pin.label}</span>
        <div class="detail-reward type-${pin.category}">${pin.reward}</div>
      </div>
      <div class="detail-title">${pin.title}</div>
      <div class="detail-meta">
        <span class="meta-pill">${building ? building.name : "楼宇"} · ${pin.floorId.toUpperCase()}</span>
        <span class="meta-pill">${pin.room}</span>
        <span class="meta-pill urgent">${pin.timeLeft}</span>
      </div>
      <div class="detail-desc">${pin.summary}</div>
      <div class="detail-actions">
        <button class="detail-btn primary">${pin.action}</button>
        ${building && building.core ? '<button class="detail-btn secondary" data-open-floor>查看楼层</button>' : ""}
      </div>
    `;

    const floorBtn = card.querySelector("[data-open-floor]");
    if (floorBtn) {
      floorBtn.addEventListener("click", () => {
        openBuilding(pin.buildingId, pin.floorId);
      });
    }

    detailLayer.appendChild(card);
  }

  function renderFloorPanel() {
    if (!activeBuildingId || !floors[activeBuildingId]) {
      floorPanel.classList.remove("open");
      floorPanel.setAttribute("aria-hidden", "true");
      floorTabs.innerHTML = "";
      panelBody.innerHTML = "";
      return;
    }

    floorPanel.classList.add("open");
    floorPanel.setAttribute("aria-hidden", "false");

    const building = buildingById(activeBuildingId);
    const floorList = floors[activeBuildingId];
    const activeFloor = floorList.find((floor) => floor.floorId === activeFloorId) || floorList[0];
    activeFloorId = activeFloor.floorId;

    panelTitle.textContent = building.name;
    panelSummary.textContent = building.summary;

    floorTabs.innerHTML = "";
    floorList.forEach((floor) => {
      const tab = document.createElement("button");
      tab.className = "floor-tab" + (floor.floorId === activeFloorId ? " active" : "");
      tab.textContent = `${floor.name} · ${floor.summary.slice(0, 10)}`;
      tab.addEventListener("click", () => {
        activeFloorId = floor.floorId;
        renderFloorPanel();
      });
      floorTabs.appendChild(tab);
    });

    panelBody.innerHTML = `
      <div class="floor-meta">
        <div class="floor-badges">
          ${activeFloor.badges.map((badge) => `<span class="floor-badge">${badge}</span>`).join("")}
        </div>
        <p class="floor-desc">${activeFloor.summary}</p>
      </div>
      <div class="floor-map-card">
        ${renderFloorSvg(activeFloor.zones)}
      </div>
      <div class="poi-list">
        ${activeFloor.pois.map((poi) => `
          <div class="poi-item">
            <span class="poi-marker" style="background:${poi.color};"></span>
            <div>
              <strong>${poi.name}</strong>
              <span>${poi.desc}</span>
            </div>
          </div>
        `).join("")}
      </div>
    `;
  }

  function renderFloorSvg(zones) {
    const zoneMarkup = zones.map((zone) => {
      const style = getZoneStyle(zone.type);
      const { x, y, w, h } = zone.shape;
      return `
        <rect x="${x}" y="${y}" width="${w}" height="${h}" rx="12" fill="${style.fill}" stroke="${style.stroke}" stroke-width="2"></rect>
        <text x="${zone.labelPosition.x}" y="${zone.labelPosition.y}" text-anchor="middle" fill="#1b2433" font-size="11" font-weight="800" font-family="Noto Sans SC, sans-serif">${zone.name}</text>
      `;
    }).join("");

    return `
      <svg viewBox="0 0 310 154" preserveAspectRatio="xMidYMid meet" aria-label="楼层示意图">
        <rect x="8" y="8" width="294" height="138" rx="22" fill="rgba(255,255,255,0.74)" stroke="rgba(31,42,58,0.1)" stroke-width="2"></rect>
        ${zoneMarkup}
      </svg>
    `;
  }

  function openBuilding(buildingId, floorId) {
    activeBuildingId = buildingId;
    activeFloorId = floorId || floors[buildingId]?.[0]?.floorId || null;
    renderBuildingLayer();
    renderFloorPanel();
  }

  function closeBuilding() {
    activeBuildingId = null;
    activeFloorId = null;
    renderBuildingLayer();
    renderFloorPanel();
  }

  panelClose.addEventListener("click", closeBuilding);

  document.addEventListener("click", (event) => {
    const clickedInsideTask = event.target.closest(".beacon") || event.target.closest(".detail-card");
    const clickedInsidePanel = event.target.closest(".floor-panel") || event.target.closest(".building-chip");
    if (!clickedInsideTask) {
      activeTaskId = null;
      renderTaskLayer();
      renderDetailCard();
    }
    if (!clickedInsidePanel && !event.target.closest("[data-open-floor]")) {
      closeBuilding();
    }
  });

  renderToolbar();
  drawMap();
  renderBuildingLayer();
  renderTaskLayer();
  renderDetailCard();
  renderFloorPanel();
</script>
</body>
</html>
